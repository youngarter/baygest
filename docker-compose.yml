services:
  mysql:
    image: mysql:8.4
    container_name: bayanv1_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bayanv1
      MYSQL_USER: bayanv1
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: bayanv1_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: bayanv1
      PMA_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "8083:80"

volumes:
  mysql_data:
